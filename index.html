<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德语训练平台</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0D1117;
  --surface:   #161B22;
  --surface2:  #1C2330;
  --surface3:  #212936;
  --accent:    #00C9A7;
  --accent-dim:rgba(0,201,167,0.10);
  --accent-mid:rgba(0,201,167,0.22);
  --gold:      #58D5C8;
  --text:      #E6EDF3;
  --text-muted:#7D8590;
  --text-dim:  #3D4654;
  --border:    rgba(255,255,255,0.07);
  --border-acc:rgba(0,201,167,0.25);
  --level-a1-bg:  rgba(0,201,167,0.12);
  --level-a1-text:#00C9A7;
  --level-a2-bg:  rgba(88,213,200,0.12);
  --level-a2-text:#58D5C8;
  --level-b1-bg:  rgba(250,199,75,0.12);
  --level-b1-text:#FAC74B;
  --level-b2-bg:  rgba(200,133,58,0.12);
  --level-b2-text:#C8853A;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  border-bottom: 1px solid var(--border);
  padding: 0 clamp(20px, 5vw, 60px);
  display: flex;
  align-items: center;
  height: 56px;
  gap: 16px;
  position: sticky;
  top: 0;
  background: rgba(13,17,23,0.9);
  backdrop-filter: blur(12px);
  z-index: 50;
}
.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--accent);
  text-decoration: none;
  letter-spacing: -0.01em;
}
.logo span { color: var(--text-muted); font-size: 13px; font-family: 'DM Sans', sans-serif; margin-left: 6px; font-style: italic; }
header nav { margin-left: auto; display: flex; gap: 4px; }
header nav a {
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
}
header nav a:hover { color: var(--text); background: var(--surface); }

/* ── HERO ── */
.hero {
  padding: clamp(48px, 8vw, 88px) clamp(20px, 5vw, 60px) 0;
  max-width: 900px;
}
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.07em;
  margin-bottom: 20px;
}
.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 6vw, 52px);
  line-height: 1.15;
  color: var(--text);
  margin-bottom: 16px;
}
.hero h1 em { color: var(--accent); font-style: normal; }
.hero p {
  font-size: clamp(14px, 1.8vw, 16px);
  color: var(--text-muted);
  max-width: 560px;
  line-height: 1.75;
}

/* ── FILTER BAR ── */
.filter-section {
  padding: clamp(32px, 4vw, 48px) clamp(20px, 5vw, 60px) 0;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  font-weight: 500;
}
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  letter-spacing: 0.03em;
}
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── STATS BAR ── */
.stats-bar {
  padding: 20px clamp(20px, 5vw, 60px) 0;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.stat {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.stat-num {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--text);
}
.stat-label { font-size: 12px; color: var(--text-muted); }
.stat-sep { width: 1px; height: 20px; background: var(--border); align-self: center; }

/* ── CONTENT AREA ── */
.content {
  padding: clamp(24px, 3vw, 36px) clamp(20px, 5vw, 60px) 80px;
}

/* ── CATEGORY SECTION ── */
.category-block { margin-bottom: 48px; }
.category-block.hidden { display: none; }

.cat-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.cat-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.cat-icon.verb       { background: rgba(0,201,167,0.12); }
.cat-icon.preposition{ background: rgba(88,213,200,0.12); }
.cat-icon.structure  { background: rgba(250,199,75,0.12); }

.cat-info h2 {
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}
.cat-info p { font-size: 12px; color: var(--text-muted); }
.cat-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-dim);
}

/* ── UNIT GRID ── */
.unit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

/* ── UNIT CARD ── */
.unit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 20px 16px;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.18s, background 0.18s, transform 0.18s;
  position: relative;
  overflow: hidden;
}
.unit-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.2s;
}
.unit-card:hover {
  border-color: var(--border-acc);
  background: var(--surface2);
  transform: translateY(-2px);
}
.unit-card:hover::before { transform: scaleX(1); }
.unit-card.coming-soon {
  opacity: 0.45;
  pointer-events: none;
  cursor: default;
}

.unit-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--accent);
  line-height: 1;
}
.unit-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}
.unit-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: auto;
}
.level-badge {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.05em;
}
.level-A1 { background: var(--level-a1-bg); color: var(--level-a1-text); }
.level-A2 { background: var(--level-a2-bg); color: var(--level-a2-text); }
.level-B1 { background: var(--level-b1-bg); color: var(--level-b1-text); }
.level-B2 { background: var(--level-b2-bg); color: var(--level-b2-text); }

.unit-stats {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
}
.unit-stats span::before { content: '·'; margin-right: 8px; color: var(--text-dim); }
.unit-stats span:first-child::before { display: none; }

/* tag */
.tag {
  font-size: 10px;
  color: var(--text-dim);
  background: var(--surface3);
  padding: 2px 7px;
  border-radius: 6px;
}

/* Coming soon empty state */
.empty-state {
  grid-column: 1 / -1;
  padding: 28px 20px;
  border: 1px dashed var(--border);
  border-radius: 12px;
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
}

/* no-results */
#no-results {
  display: none;
  padding: 60px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 24px clamp(20px, 5vw, 60px);
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
  flex-wrap: wrap;
}
footer .logo-sm {
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  color: var(--accent);
  margin-right: 8px;
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .unit-grid { grid-template-columns: 1fr 1fr; }
  .stats-bar { gap: 12px; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Deutsch<span>训练平台</span></a>
  <nav>
    <a href="index.html">训练内容</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-eyebrow">🇩🇪 德语学习</div>
  <h1>系统训练，<em>开口就说</em></h1>
  <p>覆盖动词、介词、句子结构等多种训练类型，每个单元配有语法说明、分级练习和德语标准朗读。</p>
</section>

<div class="filter-section">
  <span class="filter-label">按级别筛选</span>
  <div class="filter-chips">
    <button class="chip active" data-level="all">全部</button>
    <button class="chip" data-level="A1">A1</button>
    <button class="chip" data-level="A2">A2</button>
    <button class="chip" data-level="B1">B1</button>
    <button class="chip" data-level="B2">B2</button>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <!-- filled by JS -->
</div>

<div class="content" id="content">
  <!-- filled by JS -->
</div>

<div id="no-results">该级别暂无训练内容，敬请期待。</div>

<footer>
  <span class="logo-sm">Deutsch</span>
  <span>训练平台</span>
  <span style="margin-left:auto">内容持续更新中</span>
</footer>

<script>
const CATALOG_URL = 'data/catalog.json';

const CAT_ICONS = {
  verb:        '🔤',
  preposition: '📍',
  structure:   '🧩',
};

let catalog = null;
let activeLevel = 'all';

async function loadCatalog() {
  try {
    const res = await fetch(CATALOG_URL);
    catalog = await res.json();
  } catch(e) {
    // fallback for local file:// usage
    catalog = FALLBACK_CATALOG;
  }
  render();
}

function totalUnits(level) {
  if (!catalog) return 0;
  return catalog.categories.reduce((s, cat) => {
    return s + cat.units.filter(u =>
      level === 'all' || u.level.includes(level)
    ).length;
  }, 0);
}

function render() {
  renderStats();
  renderCategories();
}

function renderStats() {
  const bar = document.getElementById('stats-bar');
  const totalCats = catalog.categories.length;
  const totalU = totalUnits('all');
  const totalEx = catalog.categories.reduce((s, cat) =>
    s + cat.units.reduce((ss, u) => ss + (u.exercises || 0), 0), 0);
  bar.innerHTML = `
    <div class="stat"><span class="stat-num">${totalCats}</span><span class="stat-label">训练类别</span></div>
    <div class="stat-sep"></div>
    <div class="stat"><span class="stat-num">${totalU}</span><span class="stat-label">训练单元</span></div>
    <div class="stat-sep"></div>
    <div class="stat"><span class="stat-num">${totalEx}</span><span class="stat-label">练习题</span></div>
  `;
}

function renderCategories() {
  const content = document.getElementById('content');
  const noResults = document.getElementById('no-results');
  content.innerHTML = '';
  let anyVisible = false;

  catalog.categories.forEach(cat => {
    const filtered = activeLevel === 'all'
      ? cat.units
      : cat.units.filter(u => u.level.includes(activeLevel));

    const block = document.createElement('div');
    block.className = 'category-block';
    block.id = 'cat-' + cat.id;

    const visibleCount = filtered.length;
    if (visibleCount === 0 && activeLevel !== 'all') {
      block.classList.add('hidden');
    } else {
      anyVisible = true;
    }

    block.innerHTML = `
      <div class="cat-header">
        <div class="cat-icon ${cat.icon}">${CAT_ICONS[cat.icon] || '📚'}</div>
        <div class="cat-info">
          <h2>${cat.name}</h2>
          <p>${cat.description}</p>
        </div>
        <span class="cat-count">${visibleCount} 个单元</span>
      </div>
      <div class="unit-grid" id="grid-${cat.id}"></div>
    `;
    content.appendChild(block);

    const grid = document.getElementById('grid-' + cat.id);

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state">该类别训练内容即将上线，敬请期待。</div>`;
    } else {
      filtered.forEach(unit => {
        const card = buildUnitCard(unit, cat);
        grid.appendChild(card);
      });
    }

    // Show all units dimmed if category has units but none match filter
    if (filtered.length === 0 && cat.units.length > 0) {
      cat.units.forEach(unit => {
        const card = buildUnitCard(unit, cat);
        card.classList.add('coming-soon');
        grid.appendChild(card);
      });
    }
  });

  noResults.style.display = anyVisible ? 'none' : 'block';
}

function buildUnitCard(unit, cat) {
  const card = document.createElement('a');
  const url = `trainer.html?category=${cat.id}&unit=${unit.id}`;
  card.href = unit.exercises > 0 ? url : '#';
  if (!unit.exercises || unit.exercises === 0) card.classList.add('coming-soon');
  card.className = (card.className + ' unit-card').trim();
  card.innerHTML = `
    <div class="unit-title">${unit.title}</div>
    <div class="unit-subtitle">${unit.subtitle || ''}</div>
    <div class="unit-meta">
      ${unit.level.map(l => `<span class="level-badge level-${l}">${l}</span>`).join('')}
      ${unit.tags && unit.tags.length > 0
        ? `<span class="tag">${unit.tags[0]}</span>`
        : ''}
    </div>
    <div class="unit-stats">
      <span>${unit.sections || 0} 句型</span>
      <span>${unit.exercises || 0} 练习</span>
    </div>
  `;
  return card;
}

// Filter chips
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    activeLevel = chip.dataset.level;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderCategories();
  });
});

// Fallback catalog (when opened as local file://)
const FALLBACK_CATALOG = {
  categories: [
    {
      id: "verbs", name: "动词训练",
      description: "高频动词全句型通关：变位、时态、状语、疑问句",
      icon: "verb", trainer: "verb-drill",
      units: [
        { id:"geben", title:"geben", subtitle:"给 / es gibt 有",
          level:["A1"], tags:["不规则动词","双宾语","es gibt"],
          sections:8, exercises:32 }
      ]
    },
    {
      id: "prepositions", name: "介词训练",
      description: "支配格型介词：第三格、第四格、双向介词",
      icon: "preposition", trainer: "preposition-drill", units: []
    },
    {
      id: "structures", name: "句子结构训练",
      description: "句子框架：主从句、动词第二位、可分动词等",
      icon: "structure", trainer: "structure-drill", units: []
    }
  ]
};

loadCatalog();
</script>
</body>
</html>
